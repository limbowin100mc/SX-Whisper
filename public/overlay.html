<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recording</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      background: transparent !important;
      background-color: transparent !important;
    }

    body {
      background: transparent !important;
      background-color: transparent !important;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      -webkit-app-region: no-drag;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: transparent !important;
    }

    .indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      background: rgba(10, 10, 10, 0.92);
      border-radius: 20px;
      padding: 8px 14px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    }

    .mic-icon {
      width: 14px;
      height: 14px;
      fill: #ef4444;
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
        transform: scale(1);
      }
      50% {
        opacity: 0.5;
        transform: scale(0.85);
      }
    }

    .waveform {
      display: flex;
      align-items: center;
      gap: 2px;
      height: 18px;
    }

    .bar {
      width: 3px;
      border-radius: 2px;
      height: 4px;
      transition: height 0.05s ease;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="indicator">
      <svg class="mic-icon" viewBox="0 0 24 24">
        <path
          d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z" />
        <path
          d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z" />
      </svg>
      <div class="waveform">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
      </div>
    </div>
  </div>

  <script>
    // Color presets matching the app
    const OVERLAY_COLORS = {
      purple: { gradient: 'linear-gradient(to top, #8b5cf6, #c4b5fd)', color: '#8b5cf6' },
      green: { gradient: 'linear-gradient(to top, #22c55e, #86efac)', color: '#22c55e' },
      red: { gradient: 'linear-gradient(to top, #ef4444, #fca5a5)', color: '#ef4444' },
      blue: { gradient: 'linear-gradient(to top, #3b82f6, #93c5fd)', color: '#3b82f6' },
      white: { gradient: 'linear-gradient(to top, #e5e5e5, #ffffff)', color: '#ffffff' },
      cyan: { gradient: 'linear-gradient(to top, #06b6d4, #67e8f9)', color: '#06b6d4' },
      orange: { gradient: 'linear-gradient(to top, #f97316, #fdba74)', color: '#f97316' },
      pink: { gradient: 'linear-gradient(to top, #ec4899, #f9a8d4)', color: '#ec4899' },
    };

    function applyColor() {
      let colorKey = 'purple'; // default
      
      try {
        const configStr = localStorage.getItem('sx-whisper-config');
        if (configStr) {
          const config = JSON.parse(configStr);
          if (config.overlayColor && OVERLAY_COLORS[config.overlayColor]) {
            colorKey = config.overlayColor;
          }
        }
      } catch (e) {
        console.error('Error reading config:', e);
      }

      const colorConfig = OVERLAY_COLORS[colorKey];
      
      // Apply gradient to all bars
      document.querySelectorAll('.bar').forEach(bar => {
        bar.style.background = colorConfig.gradient;
      });
    }

    // Apply color on load
    applyColor();

    // Listen for storage changes (when user changes color in settings)
    window.addEventListener('storage', applyColor);

    async function startVisualization() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const audioContext = new AudioContext();
        const source = audioContext.createMediaStreamSource(stream);
        const analyser = audioContext.createAnalyser();
        analyser.fftSize = 64;
        source.connect(analyser);

        const bufferLength = analyser.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);
        const bars = document.querySelectorAll('.bar');

        const indices = [1, 2, 3, 4, 5, 6, 7];

        function animate() {
          requestAnimationFrame(animate);
          analyser.getByteFrequencyData(dataArray);

          bars.forEach((bar, i) => {
            const value = dataArray[indices[i]] || 0;
            let height = 4;
            if (value > 10) {
              height = 4 + (value / 255) * 20;
            }
            bar.style.height = `${height}px`;
          });
        }

        animate();
      } catch (err) {
        console.error('Error accessing microphone for visualization:', err);
        document.querySelectorAll('.bar').forEach((bar, i) => {
          bar.style.animation = `pulse-fallback 1.5s ease-in-out infinite ${i * 0.1}s`;
        });

        const style = document.createElement('style');
        style.innerHTML = `
          @keyframes pulse-fallback {
            0%, 100% { height: 4px; }
            50% { height: 8px; }
          }
        `;
        document.head.appendChild(style);
      }
    }

    startVisualization();
  </script>
</body>

</html>
